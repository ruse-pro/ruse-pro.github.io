<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ruse.pro | Official</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00ffcc; --secondary: #0072ff; --bg: #050505; }
        body { background-color: var(--bg); color: #fff; font-family: 'Rajdhani', sans-serif; margin: 0; text-align: center; }
        
        .header { padding: 30px; position: sticky; top: 0; backdrop-filter: blur(10px); z-index: 100; }
        
        /* İndirme Butonu */
        .download-btn {
            font-family: 'Orbitron', sans-serif;
            background: transparent;
            color: var(--primary);
            border: 2px solid var(--primary);
            padding: 15px 45px;
            text-decoration: none;
            font-weight: bold;
            border-radius: 5px;
            transition: 0.4s;
            display: inline-block;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.2);
        }
        .download-btn:hover { background: var(--primary); color: #000; box-shadow: 0 0 30px var(--primary); transform: translateY(-3px); }

        .hero { padding: 80px 20px; }
        h1 { font-family: 'Orbitron', sans-serif; font-size: 4.5rem; margin: 0; background: linear-gradient(to bottom, #fff, var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        /* Sloganın */
        .slogan { font-size: 1.6rem; color: #aaa; margin: 20px 0 50px 0; }
        .slogan span { color: var(--primary); font-weight: bold; }

        /* Developers Kısmı */
        .dev-section { padding: 50px 20px; }
        .dev-container { display: flex; justify-content: center; gap: 30px; flex-wrap: wrap; }
        .dev-card { background: #0f0f0f; border: 1px solid #222; padding: 30px; width: 220px; border-radius: 15px; transition: 0.3s; }
        .dev-card:hover { border-color: var(--secondary); transform: translateY(-10px); }
        .dev-name { font-size: 1.6rem; display: block; font-weight: bold; }
        .dev-role { color: var(--secondary); text-transform: uppercase; font-size: 0.9rem; letter-spacing: 1px; }

        footer { padding: 50px; color: #333; font-size: 0.8rem; border-top: 1px solid #111; }
    </style>
</head>
<body>

    <div class="header">
        <a href="RusePro.jar" download="RusePro.jar" class="download-btn">DOWNLOAD NOW</a>
    </div>

    <div class="hero">
        <h1>RUSE.PRO</h1>
        <p class="slogan">You don't need to play well. <span>Ruse.pro</span> will handle it.</p>
    </div>

    <div class="dev-section">
        <h2 style="font-family: 'Orbitron'; letter-spacing: 3px;">OUR DEVELOPERS</h2>
        <div class="dev-container">
            <div class="dev-card">
                <span class="dev-name">Trickster</span>
                <span class="dev-role">Founder & Lead Dev</span>
            </div>
            <div class="dev-card">
                <span class="dev-name">DarkMertatom</span>
                <span class="dev-role">Co-Founder</span>
            </div>
        </div>
    </div>

    <footer>
        &copy; 2026 Ruse.pro | No skill needed.
    </footer>

</body>
</html>
