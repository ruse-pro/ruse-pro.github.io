<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ruse.pro | Official</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #00ff88; --bg: #000; --card: #0a0a0a; }
        body { background: var(--bg); color: #fff; font-family: 'Rajdhani', sans-serif; margin: 0; overflow-x: hidden; }
        
        /* Navbar */
        .navbar { padding: 15px 10%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #111; background: rgba(0,0,0,0.9); position: sticky; top: 0; z-index: 1000; }
        .nav-links a { color: #888; text-decoration: none; margin-left: 20px; font-family: 'Orbitron'; font-size: 0.7rem; transition: 0.3s; }
        .nav-links a:hover { color: #fff; }

        /* Başarı Ekranı (Büyük Onay) */
        .success-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 9999; align-items: center; justify-content: center; flex-direction: column; text-align: center; }
        .success-overlay h1 { font-family: 'Orbitron'; font-size: 4rem; color: var(--accent); margin-bottom: 20px; text-shadow: 0 0 20px var(--accent); }
        .success-overlay button { padding: 15px 40px; font-family: 'Orbitron'; font-weight: bold; cursor: pointer; background: #fff; border: none; font-size: 1.2rem; }

        /* Hero */
        .hero { padding: 80px 20px; text-align: center; }
        .logo { font-family: 'Orbitron'; font-size: clamp(2.5rem, 8vw, 5rem); letter-spacing: 12px; margin: 0; font-weight: 700; }

        /* Wallet & Admin */
        .container { max-width: 1000px; margin: 0 auto; padding: 20px; }
        .panel { background: var(--card); border: 1px solid #1a1a1a; padding: 30px; border-radius: 12px; margin-bottom: 30px; text-align: center; }
        input { background: #000; border: 1px solid #222; padding: 12px; color: #fff; font-family: 'Orbitron'; outline: none; margin: 5px; width: 250px; }
        .main-btn { background: #fff; color: #000; border: none; padding: 12px 25px; font-family: 'Orbitron'; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .main-btn:hover { background: var(--accent); }

        /* Ekip Bölümü (Büyük & DC Logolu) */
        .team-section { padding: 80px 10%; background: #050505; border-top: 1px solid #111; }
        .team-grid { display: flex; justify-content: center; gap: 30px; flex-wrap: wrap; margin-top: 40px; }
        .team-card { background: #000; border: 2px solid #1a1a1a; padding: 50px 30px; width: 300px; border-radius: 15px; transition: 0.4s; position: relative; }
        .team-card:hover { border-color: var(--accent); transform: translateY(-10px); }
        .team-card b { display: block; font-family: 'Orbitron'; font-size: 2rem; margin-bottom: 15px; }
        .team-card .role { color: var(--accent); text-transform: uppercase; font-size: 0.8rem; letter-spacing: 3px; display: block; margin-bottom: 20px; }
        .dc-link { display: inline-flex; align-items: center; gap: 10px; color: #5865F2; text-decoration: none; font-weight: bold; font-family: 'Orbitron'; font-size: 0.9rem; }
        .dc-icon { width: 24px; height: 24px; fill: currentColor; }
    </style>
</head>
<body>

    <div id="successScreen" class="success-overlay">
        <h1>BAKİYE YÜKLENDİ!</h1>
        <p id="successDetail" style="font-size: 1.5rem; margin-bottom: 30px;">+0 TL Hesabınıza Eklendi</p>
        <button onclick="closeSuccess()">TAMAM</button>
    </div>

    <div class="navbar">
        <div style="font-family:'Orbitron'; font-weight:bold; letter-spacing:2px;">RUSE.PRO</div>
        <div id="userStatus" style="font-family:'Orbitron'; font-size:0.8rem; color:var(--accent);">GİRİŞ YAPIN</div>
    </div>

    <div class="hero">
        <h1 class="logo">RUSE.PRO</h1>
    </div>

    <div class="container">
        <div id="walletPanel" class="panel">
            <h2 style="font-family:'Orbitron'">BAKİYE: <span id="balDisplay">0</span> TL</h2>
            <input type="text" id="redeemCode" placeholder="KODU BURAYA GİR">
            <button class="main-btn" onclick="redeem()">ONAYLA</button>
        </div>

        <div class="panel" style="border-color: #333;">
            <h3 style="font-family:'Orbitron'">YÖNETİCİ: KOD ÜRET</h3>
            <input type="number" id="genAmount" placeholder="TL Miktarı (Örn: 50)">
            <button class="main-btn" onclick="generateAndSend()" style="background: var(--accent);">ÜRET VE DC'YE GÖNDER</button>
        </div>
    </div>

    <div id="ekip" class="team-section">
        <h2 style="font-family:'Orbitron'; text-align:center; font-size:2.5rem;">YÖNETİM</h2>
        <div class="team-grid">
            <div class="team-card">
                <span class="role">Kurucu</span>
                <b>Trickster</b>
                <a href="https://discord.gg/rusepro" class="dc-link">
                    <svg class="dc-icon" viewBox="0 0 24 24"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 11.721 11.721 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.196.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/></svg>
                    ruse.pro
                </a>
            </div>
            <div class="team-card">
                <span class="role">Kurucu Ortak</span>
                <b>DarkMert</b>
                <a href="#" class="dc-link">
                    <svg class="dc-icon" viewBox="0 0 24 24"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 11.721 11.721 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.196.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/></svg>
                    darkmert1233
                </a>
            </div>
        </div>
    </div>

    <script>
        const WEBHOOK_URL = "BURAYA_WEBHOOK_URL_YAPISTIR"; // Discord'dan aldığın Webhook'u buraya yapıştır

        let balance = parseInt(localStorage.getItem('ruse_bal')) || 0;
        let used = JSON.parse(localStorage.getItem('ruse_used')) || [];
        
        // F5 atınca bakiyeyi geri yükle
        window.onload = function() {
            document.getElementById('balDisplay').innerText = balance;
        };

        function closeSuccess() { document.getElementById('successScreen').style.display = 'none'; }

        function redeem() {
            const input = document.getElementById('redeemCode');
            const code = input.value.trim().toUpperCase();

            if(used.includes(code)) return alert("Bu kod daha önce kullanılmış!");

            // Sabit kodlar
            const promoCodes = {"TRICKSTER":10, "DARKMERTATOM":10, "30TLÖDE":30};
            
            // Rastgele üretilen kodları kontrol et (hafızada varsa)
            let dynamicCodes = JSON.parse(localStorage.getItem('ruse_dynamic_codes')) || {};

            let amount = promoCodes[code] || dynamicCodes[code];

            if(amount) {
                balance += amount;
                used.push(code);
                localStorage.setItem('ruse_bal', balance);
                localStorage.setItem('ruse_used', JSON.stringify(used));
                
                // Büyük başarı ekranını aç
                document.getElementById('successDetail').innerText = `+${amount} TL Hesabınıza Eklendi`;
                document.getElementById('successScreen').style.display = 'flex';
                document.getElementById('balDisplay').innerText = balance;
                input.value = "";
            } else { alert("Geçersiz Kod!"); }
        }

        // KOD ÜRETME VE WEBHOOK'A GÖNDERME
        function generateAndSend() {
            const amount = parseInt(document.getElementById('genAmount').value);
            if(!amount) return alert("Miktar gir!");

            // Rastgele 8 haneli kod üret
            const newCode = "RUSE-" + Math.random().toString(36).substr(2, 8).toUpperCase();
            
            // Kodu tarayıcı hafızasına ekle (Biri yazdığında çalışsın diye)
            let dynamicCodes = JSON.parse(localStorage.getItem('ruse_dynamic_codes')) || {};
            dynamicCodes[newCode] = amount;
            localStorage.setItem('ruse_dynamic_codes', JSON.stringify(dynamicCodes));

            // Discord Webhook'a gönder
            const msg = {
                content: "🚀 **YENİ BAKİYE KODU ÜRETİLDİ!**",
                embeds: [{
                    title: "Ruse.pro Sistem Logu",
                    color: 5763719,
                    fields: [
                        { name: "Kod", value: `\`${newCode}\``, inline: true },
                        { name: "Değer", value: `${amount} TL`, inline: true }
                    ],
                    footer: { text: "Yönetici: Trickster" }
                }]
            };

            fetch(WEBHOOK_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(msg)
            }).then(() => {
                alert(`Kod Üretildi: ${newCode}\nDiscord kanalına gönderildi!`);
            });
        }
    </script>
</body>
</html>
