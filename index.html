<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ruse.pro | Official</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #ffffff; --bg: #000000; --card: #0a0a0a; --accent: #00ff88; }
        body { background: var(--bg); color: #fff; font-family: 'Rajdhani', sans-serif; margin: 0; }
        .navbar { padding: 15px 10%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #111; background: rgba(0,0,0,0.9); position: sticky; top: 0; z-index: 1000; }
        .nav-links a { color: #888; text-decoration: none; margin-left: 20px; font-family: 'Orbitron'; font-size: 0.7rem; }
        .hero { padding: 80px 20px; text-align: center; }
        .logo { font-family: 'Orbitron'; font-size: clamp(2.5rem, 8vw, 5rem); letter-spacing: 12px; margin: 0; }
        .slogan { color: #444; letter-spacing: 2px; font-size: 1rem; margin-top: 15px; }

        /* Panel & Wallet */
        .container { max-width: 900px; margin: 0 auto; padding: 20px; }
        .auth-box, .wallet-box { background: var(--card); border: 1px solid #1a1a1a; padding: 25px; border-radius: 8px; margin-bottom: 30px; display: none; }
        input { background: #000; border: 1px solid #222; padding: 10px; color: #fff; font-family: 'Orbitron'; margin: 5px; outline: none; }
        button { background: #fff; color: #000; border: none; padding: 10px 20px; font-family: 'Orbitron'; font-weight: bold; cursor: pointer; }
        
        .market-grid { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; }
        .market-card { background: var(--card); border: 1px solid #111; padding: 30px; width: 250px; border-radius: 10px; text-align: center; }
        .price { font-size: 1.8rem; color: var(--accent); font-family: 'Orbitron'; margin: 15px 0; display: block; }

        .team-grid { display: flex; justify-content: center; gap: 15px; padding: 40px; background: #050505; }
        .t-card { border: 1px solid #222; padding: 20px; width: 180px; text-align: center; }
        .t-card b { display: block; font-family: 'Orbitron'; font-size: 1.2rem; }
    </style>
</head>
<body>

    <div class="navbar">
        <div style="font-family:'Orbitron'; font-weight:bold;">RUSE.PRO</div>
        <div id="userStatus" style="font-family:'Orbitron'; font-size:0.7rem; color:var(--accent);">GİRİŞ YAPILMADI</div>
    </div>

    <div class="hero">
        <h1 class="logo">RUSE.PRO</h1>
        <p class="slogan">YOU DON'T NEED TO PLAY WELL. RUSE.PRO WILL HANDLE IT.</p>
    </div>

    <div class="container">
        <div id="authPanel" class="auth-box" style="display: block; text-align: center;">
            <h3 id="authTitle" style="font-family:'Orbitron';">HESAP OLUŞTUR</h3>
            <input type="text" id="uName" placeholder="KULLANICI ADI">
            <input type="password" id="uPass" placeholder="ŞİFRE">
            <br><br>
            <button onclick="handleAuth()" id="authBtn">KAYIT OL</button>
            <p id="switchAuth" style="font-size:0.7rem; color:#444; cursor:pointer; margin-top:10px;" onclick="toggleAuthMode()">Zaten hesabın var mı? Giriş yap</p>
        </div>

        <div id="walletPanel" class="wallet-box" style="text-align: center;">
            <h3 style="font-family:'Orbitron'; margin-top:0;">CÜZDAN</h3>
            <p>BAKİYE: <span id="balanceVal" style="color:var(--accent); font-weight:bold;">0</span> TL</p>
            <input type="text" id="redeemCode" placeholder="KOD GİR">
            <button onclick="redeem()">YÜKLE</button>
            <br><br>
            <button onclick="logout()" style="background:transparent; color:#ff4444; font-size:0.6rem;">[ ÇIKIŞ YAP ]</button>
        </div>

        <div class="market-grid">
            <div class="market-card">
                <b style="font-family:'Orbitron';">FREE</b>
                <span class="price">0 TL</span>
                <a href="./RuseFree.jar" style="text-decoration:none;"><button style="width:100%;">İNDİR</button></a>
            </div>
            <div class="market-card">
                <b style="font-family:'Orbitron';">PRO</b>
                <span class="price">30 TL</span>
                <button onclick="buyPro()" style="width:100%;">SATIN AL</button>
            </div>
        </div>
    </div>

    <div class="team-grid">
        <div class="t-card"><span>KURUCU</span><b>Trickster</b><small>ruse.pro</small></div>
        <div class="t-card"><span>ORTAK</span><b>DarkMert</b><small>darkmert1233</small></div>
    </div>

    <script>
        let isLoginMode = false;

        function toggleAuthMode() {
            isLoginMode = !isLoginMode;
            document.getElementById('authTitle').innerText = isLoginMode ? "GİRİŞ YAP" : "HESAP OLUŞTUR";
            document.getElementById('authBtn').innerText = isLoginMode ? "GİRİŞ YAP" : "KAYIT OL";
            document.getElementById('switchAuth').innerText = isLoginMode ? "Hesabın yok mu? Kayıt ol" : "Zaten hesabın var mı? Giriş yap";
        }

        function handleAuth() {
            const user = document.getElementById('uName').value.trim();
            const pass = document.getElementById('uPass').value.trim();

            if(!user || !pass) return alert("Boş alan bırakma!");

            if(isLoginMode) {
                if(user === localStorage.getItem('ruse_user') && pass === localStorage.getItem('ruse_pass')) {
                    localStorage.setItem('isLoggedIn', 'true');
                    location.reload();
                } else { alert("Hatalı bilgiler!"); }
            } else {
                localStorage.setItem('ruse_user', user);
                localStorage.setItem('ruse_pass', pass);
                localStorage.setItem('ruse_bal', '0');
                localStorage.setItem('ruse_used', JSON.stringify([]));
                alert("Kayıt başarılı! Şimdi giriş yap.");
                toggleAuthMode();
            }
        }

        function redeem() {
            const input = document.getElementById('redeemCode');
            const code = input.value.trim().toUpperCase();
            let bal = parseInt(localStorage.getItem('ruse_bal')) || 0;
            let used = JSON.parse(localStorage.getItem('ruse_used')) || [];

            if(used.includes(code)) return alert("Bu kod kullanılmış!");

            const codes = {"İLKHİLEM":1, "ABONE":1, "TRİCKSTER":10, "DARKMERTATOM":10, "30TLÖDE":30};

            if(codes[code]) {
                bal += codes[code];
                used.push(code);
                localStorage.setItem('ruse_bal', bal);
                localStorage.setItem('ruse_used', JSON.stringify(used));
                alert(codes[code] + " TL yüklendi!");
                location.reload();
            } else { alert("Geçersiz kod!"); }
        }

        function buyPro() {
            let bal = parseInt(localStorage.getItem('ruse_bal')) || 0;
            if(localStorage.getItem('isLoggedIn') !== 'true') return alert("Önce giriş yap!");
            if(bal >= 30) {
                bal -= 30;
                localStorage.setItem('ruse_bal', bal);
                alert("PRO satın alındı!");
                location.reload();
            } else { alert("Bakiye yetersiz!"); }
        }

        function logout() {
            localStorage.setItem('isLoggedIn', 'false');
            location.reload();
        }

        // F5 ATINCA VERİLERİ ÇEKEN KISIM
        window.onload = function() {
            if(localStorage.getItem('isLoggedIn') === 'true') {
                document.getElementById('authPanel').style.display = 'none';
                document.getElementById('walletPanel').style.display = 'block';
                document.getElementById('balanceVal').innerText = localStorage.getItem('ruse_bal');
                document.getElementById('userStatus').innerText = "HOŞ GELDİN, " + localStorage.getItem('ruse_user').toUpperCase();
            }
        }
    </script>
</body>
</html>
