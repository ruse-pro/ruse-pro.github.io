<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ruse.pro | Hilenin Tek Adresi</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #00ff88; --bg: #0a0a0a; --panel: #111; --border: #222; }
        * { box-sizing: border-box; transition: 0.2s; }
        body { background: var(--bg); color: #eee; font-family: 'Rajdhani', sans-serif; margin: 0; }
        
        /* Sade Navbar */
        .navbar { padding: 20px 10%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .nav-links button { background: none; border: none; color: #666; font-family: 'Orbitron'; cursor: pointer; margin-left: 15px; font-size: 0.8rem; }
        .nav-links button:hover, .nav-links button.active { color: var(--accent); }

        .container { max-width: 900px; margin: 0 auto; padding: 50px 20px; }
        .panel { background: var(--panel); border: 1px solid var(--border); padding: 40px; border-radius: 8px; text-align: center; }
        
        /* Sade Buton ve Input */
        input { background: #000; border: 1px solid #333; padding: 12px; color: #fff; font-family: 'Orbitron'; width: 100%; max-width: 300px; text-align: center; border-radius: 4px; margin-bottom: 10px; }
        .btn { background: #eee; color: #000; border: none; padding: 12px 25px; font-family: 'Orbitron'; font-weight: bold; cursor: pointer; border-radius: 4px; }
        .btn:hover { background: var(--accent); transform: translateY(-2px); }

        .page { display: none; animation: fadeIn 0.3s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Market Kartları */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-top: 20px; }
        .card { background: #151515; border: 1px solid var(--border); padding: 25px; border-radius: 8px; text-align: center; }
        .card h3 { font-family: 'Orbitron'; font-size: 0.9rem; margin: 0; color: var(--accent); }
        .price { font-size: 1.5rem; display: block; margin: 15px 0; font-family: 'Orbitron'; }

        /* Pop-up */
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; flex-direction: column; text-align: center; }
    </style>
</head>
<body>

    <div id="successScreen" class="overlay">
        <h1 style="font-family:'Orbitron'; color:var(--accent);">İŞLEM BAŞARILI!</h1>
        <p id="successMsg" style="margin-bottom: 20px; color: #888;"></p>
        <div id="downloadArea"></div>
        <br>
        <button class="btn" onclick="closePop()">KAPAT</button>
    </div>

    <div class="navbar">
        <div style="font-family:'Orbitron'; font-weight:700; letter-spacing:2px;">RUSE.PRO</div>
        <div class="nav-links" id="menu" style="display:none">
            <button onclick="show('market')" id="m-btn">MARKET</button>
            <button onclick="show('yukle')" id="y-btn">BAKİYE</button>
            <button onclick="show('ekip')" id="e-btn">EKİP</button>
        </div>
    </div>

    <div class="container">
        <div id="p-auth" class="panel">
            <h2 style="font-family:'Orbitron'">HİLENİN TEK ADRESİ</h2>
            <input type="text" id="u" placeholder="KULLANICI ADI"><br>
            <input type="password" id="p" placeholder="ŞİFRE"><br>
            <button class="btn" onclick="login()">GİRİŞ YAP / KAYIT OL</button>
        </div>

        <div id="p-market" class="page">
            <div class="panel" style="padding:15px; margin-bottom:15px;">
                <p style="margin:0; font-family:'Orbitron'">BAKİYE: <span id="cash" style="color:var(--accent)">0</span> TL</p>
            </div>
            <div class="grid">
                <div class="card"><h3>REACH PRO</h3><span class="price">30 TL</span><button class="btn" onclick="buy(30, 'Reach_Pro.jar')">SATIN AL</button></div>
                <div class="card"><h3>KASIRGA PRO</h3><span class="price">30 TL</span><button class="btn" onclick="buy(30, 'Kasirga_Pro.jar')">SATIN AL</button></div>
                <div class="card"><h3>KILL AURA</h3><span class="price">30 TL</span><button class="btn" onclick="buy(30, 'KillAura_Pro.jar')">SATIN AL</button></div>
            </div>
        </div>

        <div id="p-yukle" class="page">
            <div class="panel">
                <h2 style="font-family:'Orbitron'">BAKİYE YÜKLE</h2>
                <input type="text" id="k" placeholder="KODUNU GİR"><br>
                <button class="btn" onclick="useCode()">ONAYLA</button>
                <p style="margin-top:20px; font-size:0.8rem;"><a href="https://www.itemsatis.com/minecraft/ruse-bakiye-100tl-5139335.html" target="_blank" style="color:var(--accent)">İtemSatış'tan Kod Al</a></p>
            </div>
        </div>

        <div id="p-ekip" class="page">
            <div class="grid">
                <div class="card"><span>KURUCU</span><b>Trickster</b></div>
                <div class="card"><span>ORTAK</span><b>DarkMertatom</b></div>
            </div>
        </div>
    </div>

    <script>
        // Dosya Linkleri (Buraya gerçek .jar linklerini koyabilirsin kanka)
        const DOWNLOADS = {
            "Reach_Pro.jar": "https://senin-siten.com/dosyalar/reach.jar",
            "Kasirga_Pro.jar": "https://senin-siten.com/dosyalar/kasirga.jar",
            "KillAura_Pro.jar": "https://senin-siten.com/dosyalar/killaura.jar"
        };

        function login() {
            const user = document.getElementById('u').value;
            const pass = document.getElementById('p').value;
            if(!user || !pass) return;
            localStorage.setItem('user', user);
            localStorage.setItem('logged', 'true');
            if(!localStorage.getItem('bal')) localStorage.setItem('bal', '0');
            location.reload();
        }

        window.onload = () => {
            if(localStorage.getItem('logged')) {
                document.getElementById('p-auth').style.display = 'none';
                document.getElementById('menu').style.display = 'flex';
                document.getElementById('cash').innerText = localStorage.getItem('bal');
                show('market');
            }
        };

        function show(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('p-' + id).classList.add('active');
        }

        function buy(price, fileName) {
            let bal = parseInt(localStorage.getItem('bal'));
            if(bal >= price) {
                bal -= price;
                localStorage.setItem('bal', bal);
                document.getElementById('cash').innerText = bal;
                
                // Başarı Mesajı ve İndirme Butonu
                document.getElementById('successMsg').innerText = "Ödeme Başarılı! Dosyan Hazır.";
                document.getElementById('downloadArea').innerHTML = `<a href="${DOWNLOADS[fileName]}" download class="btn" style="background:var(--accent); text-decoration:none; color:#000;">${fileName} İNDİR</a>`;
                document.getElementById('successScreen').style.display = 'flex';
            } else {
                alert("Bakiyen yetersiz kanka!");
            }
        }

        function useCode() {
            const code = document.getElementById('k').value.toUpperCase();
            let codes = JSON.parse(localStorage.getItem('ruse_dynamic_codes')) || {};
            if(codes[code]) {
                let bal = parseInt(localStorage.getItem('bal')) + codes[code];
                localStorage.setItem('bal', bal);
                delete codes[code];
                localStorage.setItem('ruse_dynamic_codes', JSON.stringify(codes));
                alert("Bakiye eklendi!");
                location.reload();
            } else { alert("Geçersiz kod!"); }
        }

        function closePop() { document.getElementById('successScreen').style.display = 'none'; }
    </script>
</body>
</html>
